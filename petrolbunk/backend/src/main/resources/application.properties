# ============================================================================
#  Nandha Agencies - HP  |  Default database: MySQL (persistent)
# ============================================================================
# Data is saved permanently in MySQL and can be re-derived any time.
#
# One-time setup on your machine/server:
#   1. Install MySQL and start it.
#   2. Create the database:   CREATE DATABASE nandha_agencies;
#   3. Set the username/password below (or via environment variables).
#
# You can override any value with an environment variable of the same name,
# e.g. DB_URL, DB_USER, DB_PASSWORD.
# ----------------------------------------------------------------------------

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nandha_agencies?createDatabaseIfNotExist=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# "update" keeps your data across restarts and adds new columns as the app grows.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=${PORT:8080}
