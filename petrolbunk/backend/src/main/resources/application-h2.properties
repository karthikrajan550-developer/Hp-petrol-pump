# ============================================================================
#  Quick-test profile: file-based H2, no MySQL needed.
#  Run with:  mvn spring-boot:run -Dspring-boot.run.profiles=h2
#  Data is stored in a local ./data folder. Delete it to reset.
# ============================================================================
spring.datasource.url=jdbc:h2:file:./data/nandha_agencies;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
server.port=${PORT:8080}
